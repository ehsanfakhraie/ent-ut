let activeSession = 2;
let activePage = 1;
let activeFilter = '';
const loadedContent = {};
const $ = id => document.getElementById(id);

function renderTabs(){
  $('sessionTabs').innerHTML = Object.entries(sessions).map(([id,s]) =>
    `<button class="tab ${Number(id)===activeSession?'active':''}" data-session="${id}">${s.title}</button>`
  ).join('');
  document.querySelectorAll('[data-session]').forEach(btn=>btn.onclick=()=>setSession(Number(btn.dataset.session)));
}

function renderSlides(){
  const s=sessions[activeSession];
  $('slideCount').textContent=`${faNum(s.pages)} اسلاید`;
  $('activeSessionLabel').textContent=s.title;
  const q=clean(activeFilter).toLowerCase();
  $('slides').innerHTML = s.slides.map((slide,i)=>{
    const page=i+1, title=slide[0], ids=slide[1];
    const hay=(title+' '+ids.map(id=>refLabel(id)).join(' ')).toLowerCase();
    const hide=q && !hay.includes(q);
    const sectionPills = ids.length ? `<span class="slide-sections">${ids.map(id=>`<span class="pill">${highlight(refLabel(id))}</span>`).join('')}</span>` : '';
    return `<button class="slide-btn ${page===activePage?'active':''} ${hide?'hidden':''}" data-page="${page}">
      <span class="slide-preview" aria-hidden="true">
        <img src="${slideImageUrl(s, page)}" alt="" loading="lazy" decoding="async">
      </span>
      <span class="slide-info">
        <span class="slide-meta"><span>اسلاید ${faNum(page)}</span><span>${s.title}</span></span>
        <span class="slide-title">${highlight(title)}</span>
        ${sectionPills}
      </span>
    </button>`;
  }).join('');
  document.querySelectorAll('[data-page]').forEach(btn=>btn.onclick=()=>setPage(Number(btn.dataset.page)));
}

function refLabel(ref){
  return SECTION_REFS[activeSession]?.[ref] || ref;
}

async function setSession(id){
  activeSession=id;
  activePage=1;
  await loadContent(id);
  render();
}

function setPage(page){
  const max=sessions[activeSession].pages;
  activePage=Math.min(max,Math.max(1,page));
  renderSlides();
  renderCurrent();
}

function renderCurrent(){
  const s=sessions[activeSession];
  const slide=s.slides[activePage-1];
  $('currentTitle').innerHTML=highlight(slide[0]);
  $('currentMeta').textContent=`${s.title} • اسلاید ${faNum(activePage)} از ${faNum(s.pages)} • ${s.topic}`;
  const pdfUrl=`${s.pdf}#page=${activePage}&view=FitH`;
  $('slideImage').src=slideImageUrl(s, activePage);
  $('slideImage').alt=`${s.title}، اسلاید ${faNum(activePage)}: ${slide[0]}`;
  $('openPdf').href=pdfUrl;
  $('openPdf').textContent='باز کردن PDF';
  $('sourceLink').innerHTML=s.md
    ? `منبع محتوا: <a href="${s.md}" target="_blank" rel="noopener">${s.md}</a>`
    : 'برای این جلسه فعلاً محتوای متنی وصل نشده است.';

  const ids=slide[1];
  const doc=loadedContent[activeSession];
  if(!doc){
    $('outline').innerHTML='';
    $('content').innerHTML='<div class="empty">در حال خواندن محتوای Markdown…</div>';
    return;
  }
  const linkedHeadings = ids.map(refToHeadingId).filter(Boolean);
  $('outline').innerHTML=doc.headings.filter(h=>h.level<=3).map(h =>
    `<button class="${linkedHeadings.includes(h.id)?'active':''}" data-heading="${h.id}">${highlight(shortTitle(h.title))}</button>`
  ).join('');
  document.querySelectorAll('[data-heading]').forEach(btn=>btn.onclick=()=>scrollToHeading(btn.dataset.heading));
  $('content').innerHTML=`<div class="md-content">${doc.html}</div>`;
  markLinkedHeadings(linkedHeadings);
  requestAnimationFrame(()=>scrollToHeading(linkedHeadings[0], true));
}

function refToHeadingId(ref){
  const query = SECTION_REFS[activeSession]?.[ref];
  const doc = loadedContent[activeSession];
  if(!query || !doc) return '';
  const nq = normalizeTitle(query);
  const found = doc.headings.find(h => normalizeTitle(h.title).includes(nq) || nq.includes(normalizeTitle(h.title)));
  return found?.id || '';
}

function slideImageUrl(session, page){
  return `${session.slideDir}/slide-${String(page).padStart(2,'0')}.png`;
}

function scrollToHeading(id, soft=false){
  if(!id) return;
  const target = document.getElementById(id);
  if(!target) return;
  target.classList.add('active-heading');
  target.scrollIntoView({block:'start', behavior: soft ? 'smooth' : 'auto'});
  window.setTimeout(()=>target.classList.remove('active-heading'), 1600);
}

function markLinkedHeadings(ids){
  document.querySelectorAll('.linked-heading').forEach(el=>el.classList.remove('linked-heading'));
  ids.forEach(id=>document.getElementById(id)?.classList.add('linked-heading'));
}

function highlight(text){
  const q=clean(activeFilter);
  if(!q) return text;
  const esc=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return String(text).replace(new RegExp(esc,'gi'),m=>`<mark>${m}</mark>`);
}

function normalizeTitle(text){
  return clean(text)
    .replace(/[۰-۹]/g,d=>PERSIAN_DIGITS.indexOf(d))
    .replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d))
    .replace(/^[\d.ـ\-\s]+/,'')
    .replace(/[؟?؛:،,.()[\]«»"'`]/g,'')
    .toLowerCase();
}

function shortTitle(title){
  return title.replace(/^[۰-۹0-9]+(?:[.ـ-][۰-۹0-9]+)?[.،\s]*/,'');
}

async function loadContent(sessionId){
  if(loadedContent[sessionId]) return;
  $('content').innerHTML='<div class="empty">در حال خواندن محتوای کامل Markdown…</div>';
  const path=sessions[sessionId].md;
  if(!path){
    loadedContent[sessionId]={html:'<div class="empty">برای این جلسه فعلاً محتوای متنی ثبت نشده است.</div>', headings:[]};
    return;
  }
  try{
    const res=await fetch(path);
    if(!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    loadedContent[sessionId]=parseMarkdown(await res.text(), sessionId);
  }catch(err){
    loadedContent[sessionId]={html:`<div class="empty">خواندن فایل ${escapeHtml(path)} ممکن نشد. صفحه را با یک سرور محلی اجرا کنید.</div>`, headings:[]};
  }
}

function parseMarkdown(md, sessionId){
  const lines=md.replace(/\r\n/g,'\n').split('\n');
  const headings=[];
  let html='', paragraph=[];
  const flushParagraph=()=>{
    if(!paragraph.length) return;
    html += `<p>${inline(paragraph.join(' '))}</p>`;
    paragraph=[];
  };
  const readTable=(start)=>{
    const rows=[];
    let i=start;
    while(i<lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){
      if(!/^\s*\|?\s*:?-{3,}/.test(lines[i])) rows.push(lines[i]);
      i++;
    }
    html += '<table>' + rows.map((row,idx)=>{
      const cells=row.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(c=>inline(c.trim()));
      return `<tr>${cells.map(c=>idx===0?`<th>${c}</th>`:`<td>${c}</td>`).join('')}</tr>`;
    }).join('') + '</table>';
    return i-1;
  };
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    if(!clean(line)){flushParagraph(); continue;}
    const heading=line.match(/^(#{1,3})\s+(.+)$/);
    if(heading){
      flushParagraph();
      const level=heading[1].length;
      const title=heading[2].trim();
      const id=`md-${sessionId}-${headings.length+1}`;
      headings.push({id,title,level});
      html += `<h${level} id="${id}">${inline(title)}</h${level}>`;
      continue;
    }
    if(/^\s*\|.*\|\s*$/.test(line)){
      flushParagraph();
      i=readTable(i);
      continue;
    }
    const list=line.match(/^\s*(-|\d+\.)\s+(.+)$/);
    if(list){
      flushParagraph();
      const ordered=/^\d+\./.test(list[1]);
      const tag=ordered?'ol':'ul';
      html += `<${tag}>`;
      while(i<lines.length){
        const item=lines[i].match(/^\s*(-|\d+\.)\s+(.+)$/);
        if(!item) break;
        html += `<li>${inline(item[2])}</li>`;
        i++;
      }
      html += `</${tag}>`;
      i--;
      continue;
    }
    if(/^>/.test(line)){
      flushParagraph();
      html += `<blockquote>${inline(line.replace(/^>\s*/,''))}</blockquote>`;
      continue;
    }
    paragraph.push(line.trim());
  }
  flushParagraph();
  return {html, headings};
}

function inline(text){
  let value=escapeHtml(text);
  value=value.replace(/`([^`]+)`/g,'<code>$1</code>');
  value=value.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  return highlight(value);
}

function escapeHtml(text){
  return String(text).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));
}

function render(){
  renderTabs();
  renderSlides();
  renderCurrent();
}

$('prevSlide').onclick=()=>setPage(activePage-1);
$('nextSlide').onclick=()=>setPage(activePage+1);
$('search').oninput=e=>{activeFilter=e.target.value;renderSlides();renderCurrent();};
$('theme').onclick=()=>document.documentElement.toggleAttribute('data-theme');
window.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') setPage(activePage-1);
  if(e.key==='ArrowLeft') setPage(activePage+1);
});
loadContent(activeSession).then(render);
