}.content th,.content td{border:1px solid var(--border);padding:9px 11px;text-align:right;vertical-align:top}.content th{background:color-mix(in srgb,var(--accent) 10%,var(--card));font-weight:900}.content tr:nth-child(even){background:color-mix(in srgb,var(--line) 30%,transparent)}.empty{padding:60px 20px;text-align:center;color:var(--muted)}mark{background:color-mix(in srgb,#fbbf24 35%,transparent);color:inherit;border-radius:3px;padding:0 2px}.user-highlight{background:#fde68a!important;box-shadow:inset 0 -2px rgba(217,119,6,.24)}[data-theme="dark"] .user-highlight{background:#8a650d!important;color:#fff2c2}

@media(max-width:850px){.toolbar{grid-template-columns:minmax(0,1fr) auto;grid-template-areas:"brand actions" "search search";padding:calc(8px + env(safe-area-inset-top)) 10px 8px}.brand{grid-area:brand}.search{grid-area:search}.actions{grid-area:actions}.brand-mark{width:39px;height:39px;font-size:18px}.brand h1{font-size:13px}.brand small{display:none}.home span{display:none}.home{width:40px;padding:0}.workspace{display:flex;flex-direction:column;padding:8px;gap:8px}.side{height:116px;position:static;flex:0 0 auto}.side-head{display:none}.chapter-list{flex-direction:row;overflow-x:auto;overflow-y:hidden;padding:8px}.chapter{flex:0 0 205px;min-height:69px}.reader{min-height:calc(100dvh - 255px)}.reader-head{padding:14px 15px 0}.content{padding:21px 17px 40px;font-size:14px;line-height:2.2}.content h1{font-size:19px}.content h2{font-size:16px;margin-top:29px}.content h3{font-size:15px}.content table{font-size:12px;display:block;overflow-x:auto}.control{min-width:132px;max-width:42vw}.tabs{gap:4px;overflow-x:auto}.tab{padding:9px 12px;white-space:nowrap}.flashcards{padding:16px 11px 26px}.flashcard{height:clamp(350px,55dvh,460px);min-height:0}.flash-face{padding:16px}.flash-text{font-size:clamp(17px,5vw,22px);line-height:1.9}.flash-face.back .flash-text{font-size:clamp(14px,4vw,17px);line-height:2}.flash-status{font-size:10px}.flash-actions{grid-template-columns:1fr 1.35fr 1fr}}

<body>
<div class="app">
  <header class="toolbar">
    <div class="brand"><div class="brand-mark">درس</div><div><h1>کارآفرینی سازمانی</h1><small>متن کامل و خلاصه‌های ۱۲ فصل</small></div></div>
    <label class="search"><span>⌕</span><input id="search" type="search" placeholder="جست‌وجو در فصل باز…" autocomplete="off"></label>
    <div class="actions"><select class="control" id="chapterSelect" aria-label="انتخاب فصل"></select><button class="icon-btn" id="theme" title="تغییر پوسته">◐</button><a class="home" href="/" title="صفحه اصلی">⌂ <span>خانه</span></a></div>
  </header>
  <main class="workspace">
    <aside class="side"><div class="side-head"><h2>فصل‌ها</h2><p id="sourceState">در حال بارگذاری منابع…</p></div><nav class="chapter-list" id="chapterList" aria-label="فهرست فصل‌ها"></nav></aside>
    <section class="reader"><header class="reader-head"><div class="eyebrow" id="eyebrow">فصل</div><h2 class="reader-title" id="title">در حال بارگذاری…</h2><p class="reader-meta" id="meta"></p><div class="tabs" role="tablist"><button class="tab active" id="chapterTab" role="tab" aria-selected="true">متن کامل فصل</button><button class="tab" id="summaryTab" role="tab" aria-selected="false">خلاصه فصل</button><button class="tab" id="flashcardsTab" role="tab" aria-selected="false">فلش‌کارت‌ها</button></div><div class="reader-actions"><button class="reader-action highlight" id="addHighlight">🖍 هایلایت انتخاب</button><button class="reader-action" id="clearHighlights">پاک‌کردن هایلایت‌های این بخش</button><button class="reader-action" id="exportState">↓ خروجی یادگیری</button><button class="reader-action" id="importState">↑ بارگذاری یادگیری</button><input id="importFile" type="file" accept="application/json,.json" hidden></div></header><article class="content" id="content" tabindex="-1"></article></section>
  </main>
</div>
<script>
const FA='۰۱۲۳۴۵۶۷۸۹', toFa=n=>String(n).replace(/\d/g,d=>FA[d]);
const els={search:document.getElementById('search'),chapterSelect:document.getElementById('chapterSelect'),chapterList:document.getElementById('chapterList'),sourceState:document.getElementById('sourceState'),eyebrow:document.getElementById('eyebrow'),title:document.getElementById('title'),meta:document.getElementById('meta'),content:document.getElementById('content'),chapterTab:document.getElementById('chapterTab'),summaryTab:document.getElementById('summaryTab'),flashcardsTab:document.getElementById('flashcardsTab'),addHighlight:document.getElementById('addHighlight'),clearHighlights:document.getElementById('clearHighlights'),exportState:document.getElementById('exportState'),importState:document.getElementById('importState'),importFile:document.getElementById('importFile'),theme:document.getElementById('theme')};
const files=Array.from({length:12},(_,i)=>String(i+1).padStart(2,'0'));
let lessons=[],selected=0,view='chapter',cardIndex=0,flipped=false,flashStatus='';
const known=new Set(JSON.parse(localStorage.getItem('org-course-qa-known')||'[]')),
  review=new Set(JSON.parse(localStorage.getItem('org-course-qa-review')||'[]'));
let highlights=JSON.parse(localStorage.getItem('org-course-highlights')||'{}');
const escapeHtml=text=>text.replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
function inline(text){return escapeHtml(text).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\[\^\d+\]/g,'');}
function markdownToHtml(markdown){
  const lines=markdown.replace(/\r/g,'').replace(/^\[\^\d+\]:.*$/gm,'').split('\n');let html='',list=null,table=[];
  const flushList=()=>{if(list){html+=`</${list}>`;list=null}};const flushTable=()=>{if(!table.length)return;const rows=table.filter((row,i)=>!(i===1&&/^\s*:?-+/.test(row.replace(/\|/g,'').trim()))).map(row=>row.trim().replace(/^\||\|$/g,'').split('|').map(cell=>cell.trim()));html+='<table>'+rows.map((cells,i)=>`<tr>${cells.map(cell=>`<${i===0?'th':'td'}>${inline(cell)}</${i===0?'th':'td'}>`).join('')}</tr>`).join('')+'</table>';table=[]};
  for(const raw of lines){const line=raw.trim();if(/^\|.*\|$/.test(line)){flushList();table.push(line);continue}flushTable();if(!line){flushList();continue}if(/^---+$/.test(line)){flushList();html+='<hr>';continue}let m=line.match(/^(#{1,3})\s+(.+)$/);if(m){flushList();html+=`<h${m[1].length}>${inline(m[2])}</h${m[1].length}>`;continue}m=line.match(/^[-*+]\s+(.+)$/);if(m){if(list&&list!=='ul'){flushList()}if(!list){html+='<ul>';list='ul'}html+=`<li>${inline(m[1])}</li>`;continue}m=line.match(/^(\d+)\.\s+(.+)$/);if(m){if(list&&list!=='ol'){flushList()}if(!list){html+='<ol>';list='ol'}html+=`<li>${inline(m[2])}</li>`;continue}if(line.startsWith('>')){flushList();html+=`<blockquote>${inline(line.replace(/^>\s*/,''))}</blockquote>`;continue}flushList();html+=`<p>${inline(line)}</p>`}flushList();flushTable();return html||'<div class="empty">محتوایی برای نمایش وجود ندارد.</div>';
}
function chapterTitle(markdown,number){const heading=markdown.match(/^#\s+(.+)$/m);return heading?heading[1].replace(/^خلاصه\s+/, ''):`فصل ${toFa(number)}`}
function parseFlashcards(markdown){const cards=[];let current=null;for(const line of markdown.replace(/\r/g,'').split('\n')){const heading=line.match(/^##\s+کارت\s+([۰-۹0-9]+)/);if(heading){if(current?.question&&current.answer)cards.push(current);current={number:cards.length+1,question:'',answer:''};continue}const q=line.match(/^\*\*پرسش:\*\*\s*(.+)$/),a=line.match(/^\*\*پاسخ:\*\*\s*(.+)$/);if(q&&current)current.question=q[1].trim();if(a&&current)current.answer=a[1].trim()}if(current?.question&&current.answer)cards.push(current);return cards}
function renderNav(){els.chapterSelect.innerHTML=lessons.map((lesson,i)=>`<option value="${i}">فصل ${toFa(i+1)}: ${escapeHtml(lesson.title)}</option>`).join('');els.chapterSelect.value=selected;els.chapterList.innerHTML='';lessons.forEach((lesson,i)=>{const button=document.createElement('button');button.className='chapter'+(i===selected?' active':'');button.type='button';button.innerHTML=`<span class="num">${toFa(i+1)}</span><span><span class="chapter-title">${escapeHtml(lesson.title)}</span><span class="chapter-sub">متن و خلاصه</span></span>`;button.onclick=()=>selectChapter(i);els.chapterList.append(button)});}
function highlight(html,term){if(!term)return html;const safe=escapeHtml(term);return html.replace(new RegExp(`(${safe.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark>$1</mark>')}
function cardId(card){return`${selected}:${card.number}`}
function saveMarks(){localStorage.setItem('org-course-qa-known',JSON.stringify([...known]));localStorage.setItem('org-course-qa-review',JSON.stringify([...review]))}
function highlightKey(){return`${selected}:${view}`}
function saveHighlights(){localStorage.setItem('org-course-highlights',JSON.stringify(highlights))}
function positionAt(root,offset){const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);let node,remaining=offset;while(node=walker.nextNode()){if(remaining<=node.data.length)return{node,offset:remaining};remaining-=node.data.length}return null}
function applyHighlights(){const ranges=highlights[highlightKey()]||[];for(const item of ranges){const start=positionAt(els.content,item.start),end=positionAt(els.content,item.end);if(!start||!end||item.end<=item.start)continue;const walker=document.createTreeWalker(els.content,NodeFilter.SHOW_TEXT);let node;while(node=walker.nextNode()){const nodeStart=(()=>{const r=document.createRange();r.selectNodeContents(els.content);r.setEnd(node,0);return r.toString().length})();const nodeEnd=nodeStart+node.data.length;if(nodeEnd<=item.start||nodeStart>=item.end)continue;const from=Math.max(0,item.start-nodeStart),to=Math.min(node.data.length,item.end-nodeStart),fragment=document.createDocumentFragment();if(from)fragment.append(node.data.slice(0,from));const mark=document.createElement('mark');mark.className='user-highlight';mark.textContent=node.data.slice(from,to);fragment.append(mark);if(to<node.data.length)fragment.append(node.data.slice(to));node.replaceWith(fragment)}}}
function addHighlight(){if(view==='flashcards')return;const selection=getSelection();if(!selection||selection.rangeCount!==1||selection.isCollapsed)return;const range=selection.getRangeAt(0);if(!els.content.contains(range.startContainer)||!els.content.contains(range.endContainer))return;const startRange=document.createRange(),endRange=document.createRange();startRange.selectNodeContents(els.content);startRange.setEnd(range.startContainer,range.startOffset);endRange.selectNodeContents(els.content);endRange.setEnd(range.endContainer,range.endOffset);const start=startRange.toString().length,end=endRange.toString().length;if(end<=start)return;const key=highlightKey(),items=highlights[key]||[];if(!items.some(item=>item.start===start&&item.end===end)){items.push({start,end});highlights[key]=items;saveHighlights()}selection.removeAllRanges();render()}
function exportLearning(){const data={version:1,exportedAt:new Date().toISOString(),known:[...known],review:[...review],highlights};const url=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'})),link=document.createElement('a');link.href=url;link.download='organizational-entrepreneurship-learning.json';link.click();URL.revokeObjectURL(url)}
async function importLearning(file){try{const data=JSON.parse(await file.text());if(!Array.isArray(data.known)||!Array.isArray(data.review)||!data.highlights||typeof data.highlights!=='object')throw Error('ساختار فایل معتبر نیست.');known.clear();review.clear();data.known.filter(value=>typeof value==='string').forEach(value=>known.add(value));data.review.filter(value=>typeof value==='string').forEach(value=>review.add(value));highlights=data.highlights;saveMarks();saveHighlights();render()}catch(error){alert(`بارگذاری فایل انجام نشد: ${error.message}`)}}
function renderFlashcards(lesson){const term=els.search.value.trim().toLowerCase(),cards=lesson.cards.filter(card=>{const id=cardId(card),inSearch=!term||(card.question+' '+card.answer).toLowerCase().includes(term),inStatus=!flashStatus||(flashStatus==='known'&&known.has(id))||(flashStatus==='review'&&review.has(id))||(flashStatus==='unmarked'&&!known.has(id)&&!review.has(id));return inSearch&&inStatus});cardIndex=Math.min(cardIndex,Math.max(cards.length-1,0));const knownCount=lesson.cards.filter(card=>known.has(cardId(card))).length;if(!cards.length){els.content.innerHTML='<div class="empty">فلش‌کارتی مطابق فیلتر شما پیدا نشد.</div>';return}const card=cards[cardIndex],id=cardId(card),number=toFa(cardIndex+1),total=toFa(cards.length);els.content.innerHTML=`<div class="flashcards"><div class="flash-tools"><select class="flash-select" id="flashStatus"><option value="">همه وضعیت‌ها</option><option value="known">بلدم</option><option value="review">مرور</option><option value="unmarked">بدون وضعیت</option></select><button class="flash-shuffle" id="shuffleCards" title="ترتیب تصادفی">⤨</button></div><div class="flash-status"><span>کارت ${number} از ${total} · ${toFa(knownCount)} بلد</span><span>برای دیدن پاسخ، کارت را برگردانید</span></div><div class="flash-progress"><div style="width:${((cardIndex+1)/cards.length)*100}%"></div></div><div class="flashcard"><div class="flash-inner${flipped?' flipped':''}" id="flashInner"><section class="flash-face"><div class="flash-kicker"><span>کارت ${number}</span><span>پرسش</span></div><div class="flash-text">${inline(card.question)}</div></section><section class="flash-face back"><div class="flash-kicker"><span>کارت ${number}</span><span>پاسخ</span></div><div class="flash-text">${inline(card.answer)}</div></section></div></div><div class="flash-actions"><button id="prevCard">قبلی</button><button class="primary" id="flipCard">${flipped?'نمایش پرسش':'نمایش پاسخ'}</button><button id="nextCard">بعدی</button></div><div class="flash-marks"><button class="known${known.has(id)?' active':''}" id="knownCard">بلدم</button><button class="review${review.has(id)?' active':''}" id="reviewCard">مرور</button></div></div>`;document.getElementById('flashStatus').value=flashStatus;document.getElementById('flashStatus').onchange=event=>{flashStatus=event.target.value;cardIndex=0;flipped=false;render()};document.getElementById('shuffleCards').onclick=()=>{lesson.cards.sort(()=>Math.random()-.5);cardIndex=0;flipped=false;render()};document.getElementById('flashInner').onclick=()=>{flipped=!flipped;render()};document.getElementById('flipCard').onclick=()=>{flipped=!flipped;render()};document.getElementById('prevCard').onclick=()=>{cardIndex=(cardIndex-1+cards.length)%cards.length;flipped=false;render()};document.getElementById('nextCard').onclick=()=>{cardIndex=(cardIndex+1)%cards.length;flipped=false;render()};document.getElementById('knownCard').onclick=()=>{known.has(id)?known.delete(id):known.add(id);review.delete(id);saveMarks();render()};document.getElementById('reviewCard').onclick=()=>{review.has(id)?review.delete(id):review.add(id);known.delete(id);saveMarks();render()}}
function render(){const lesson=lessons[selected];if(!lesson)return;const text=view==='chapter'?lesson.chapter:lesson.summary,labels={chapter:'متن کامل',summary:'خلاصه',flashcards:'فلش‌کارت‌ها'},textMode=view!=='flashcards';els.eyebrow.textContent=`فصل ${toFa(selected+1)} · ${labels[view]}`;els.title.textContent=lesson.title;els.meta.textContent=view==='chapter'?'مطالعه متن اصلی فصل':view==='summary'?'مرور فشرده نکات، مفاهیم و جمع‌بندی فصل':`${toFa(lesson.cards.length)} پرسش و پاسخ برای مرور فعال`;if(view==='flashcards')renderFlashcards(lesson);else{els.content.innerHTML=highlight(markdownToHtml(text),els.search.value.trim());applyHighlights()}els.addHighlight.disabled=!textMode;els.clearHighlights.disabled=!textMode;[els.chapterTab,els.summaryTab,els.flashcardsTab].forEach(tab=>{const active=tab.id===`${view}Tab`;tab.classList.toggle('active',active);tab.setAttribute('aria-selected',active)});renderNav();}
function selectChapter(index){selected=index;cardIndex=0;flipped=false;flashStatus='';els.search.value='';render();if(innerWidth<=850)els.content.focus({preventScroll:true});}
async function init(){try{lessons=await Promise.all(files.map(async number=>{const [chapter,summary,qa]=await Promise.all([fetch(`sources/org/chapters/chapter-${number}.md`).then(r=>{if(!r.ok)throw Error(r.status);return r.text()}),fetch(`sources/org/summeries/chapter-${number}-summary.md`).then(r=>{if(!r.ok)throw Error(r.status);return r.text()}),fetch(`sources/org/qa/chapter-${number}-flashcards.md`).then(r=>{if(!r.ok)throw Error(r.status);return r.text()})]);return{chapter,summary,cards:parseFlashcards(qa),title:chapterTitle(chapter,Number(number))}}));els.sourceState.textContent=`${toFa(lessons.length)} فصل، خلاصه و فلش‌کارت`;render()}catch(error){els.sourceState.textContent='خطا در بارگذاری منابع';els.content.innerHTML=`<div class="empty">منابع درس بارگذاری نشدند: ${escapeHtml(String(error.message))}</div>`}}
els.chapterSelect.onchange=()=>selectChapter(Number(els.chapterSelect.value));els.chapterTab.onclick=()=>{view='chapter';render()};els.summaryTab.onclick=()=>{view='summary';render()};els.flashcardsTab.onclick=()=>{view='flashcards';cardIndex=0;flipped=false;render()};els.search.oninput=()=>{cardIndex=0;flipped=false;render()};els.addHighlight.onclick=addHighlight;els.clearHighlights.onclick=()=>{if(view!=='flashcards'){delete highlights[highlightKey()];saveHighlights();render()}};els.exportState.onclick=exportLearning;els.importState.onclick=()=>els.importFile.click();els.importFile.onchange=event=>{const file=event.target.files[0];if(file)importLearning(file);event.target.value=''};els.theme.onclick=()=>{const next=document.documentElement.dataset.theme==='dark'?'':'dark';document.documentElement.dataset.theme=next;localStorage.setItem('org-course-theme',next)};window.addEventListener('keydown',event=>{if(view!=='flashcards'||event.target.matches('input,select'))return;if(event.key==='ArrowLeft')document.getElementById('nextCard')?.click();if(event.key==='ArrowRight')document.getElementById('prevCard')?.click();if(event.key===' '||event.key==='Enter'){event.preventDefault();document.getElementById('flipCard')?.click()}});const savedTheme=localStorage.getItem('org-course-theme');if(savedTheme)document.documentElement.dataset.theme=savedTheme;init();
</script>
